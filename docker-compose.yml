services:
  web:
    build: .
    container_name: django_container

    command: >
      sh -c "
      python manage.py migrate &&
      python manage.py runserver 0.0.0.0:8000
      "

    volumes:
      - .:/app
      - ./media:/app/media

    ports:
      - "8000:8000"

    depends_on:
      db:
        condition: service_healthy